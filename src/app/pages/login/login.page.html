<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>LiftBig Login</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content
  [fullscreen]="true"
  class="ion-padding flex flex-col justify-center h-full"
>
  <div class="flex flex-col gap-4 mt-10">
    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold text-primary">LiftBig</h1>
      <p class="text-muted">Train like a champion.</p>
    </div>

    <ion-item class="rounded-lg">
      <ion-label position="stacked">Email</ion-label>
      <ion-input
        type="email"
        [(ngModel)]="credentials.email"
        placeholder="email@example.com"
      ></ion-input>
    </ion-item>

    <ion-item class="rounded-lg">
      <ion-label position="stacked">Password</ion-label>
      <ion-input
        type="password"
        [(ngModel)]="credentials.password"
        placeholder="******"
      ></ion-input>
    </ion-item>

    <div class="flex gap-2 mt-6">
      <ion-button expand="block" class="flex-1" (click)="login()">
        Login
      </ion-button>
      <ion-button
        expand="block"
        fill="outline"
        class="flex-1"
        (click)="register()"
      >
        Register
      </ion-button>
    </div>
  </div>
</ion-content>
